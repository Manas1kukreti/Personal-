services:
  postgres:
    image: postgres:16-alpine
    container_name: excelflow-postgres
    environment:
      POSTGRES_DB: excelflow
      POSTGRES_USER: excelflow
      POSTGRES_PASSWORD: excelflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excelflow -d excelflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: excelflow-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://excelflow:excelflow@postgres:5432/excelflow
      APP_NAME: ExcelFlow Analytics API
      UPLOAD_DIR: /app/storage/uploads
      MAX_PREVIEW_ROWS: 50
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      JWT_SECRET_KEY: change-this-before-production
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: excelflow-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
